-
  feature: "$ddt{feature}"
  base_url: "${read_config_yaml(base,url)}"
  request:
    url: "/api/auth/login"
    method: "post"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer ${read_extract_yaml(access_token)}"
    json:
      username: "$ddt{username}"
      password: "$ddt{password}"
  extract:
    - access_token: "$..access_token"
  validate:
    - equals: {"$.code": "$ddt{code}"}
    - equals: {"$.message": "$ddt{message}"}
    - greater: {"$.time": 2000}
    - between: {"$.time": [1000, 3000]}
  parameterize:
    - ["feature", "username", "password", "code", "message"]
    - ["登录-正常登录", "admin", "admin123", 0, "成功"]
    - ["登录-用户名错误", "admin", "admin1231", 1, "用户名或密码错误"]